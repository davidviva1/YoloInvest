name: CI

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-tools

      - name: Check locked requirements
        run: |
          python -m venv venv
          venv/bin/pip install -r requirements.txt
          venv/bin/pip install pip-tools
          venv/bin/python check_requirements.py

      - name: Compile Python files
        run: python -m compileall yoloinvest check_requirements.py

      - name: Import core modules
        run: |
          python - <<'PY'
          import yoloinvest.config
          import yoloinvest.common.models
          import yoloinvest.common.fetchers
          import yoloinvest.common.sender
          import yoloinvest.market_briefing.app
          import yoloinvest.market_briefing.analyzers
          import yoloinvest.market_briefing.generators
          import yoloinvest.options_alert.alert
          print('Core modules imported successfully')
          PY
